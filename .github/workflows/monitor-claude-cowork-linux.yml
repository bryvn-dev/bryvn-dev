name: Weekly Monitor - claude-cowork-linux

on:
  schedule:
      # Every Monday at 09:00 UTC
          - cron: '0 9 * * 1'
            workflow_dispatch: # Allow manual trigger

            jobs:
              check-for-updates:
                  runs-on: ubuntu-latest
                      steps:
                            - name: Fetch recent commits from claude-cowork-linux
                                    id: check_commits
                                            run: |
                                                      SINCE=$(date -d '7 days ago' --utc +%Y-%m-%dT%H:%M:%SZ)
                                                                RESPONSE=$(curl -s \
                                                                            -H "Accept: application/vnd.github+json" \
                                                                                        -H "X-GitHub-Api-Version: 2022-11-28" \
                                                                                                    "https://api.github.com/repos/johnzfitch/claude-cowork-linux/commits?since=${SINCE}&per_page=50")
                                                                                                    
                                                                                                              COUNT=$(echo "$RESPONSE" | jq '. | length')
                                                                                                                        echo "commit_count=$COUNT" >> $GITHUB_OUTPUT
                                                                                                                        
                                                                                                                                  if [ "$COUNT" -gt 0 ]; then
                                                                                                                                              SUMMARY=$(echo "$RESPONSE" | jq -r '.[] | "- \(.commit.message | split("\n")[0]) (\(.commit.author.date | split("T")[0])) by \(.commit.author.name)"' | head -20)
                                                                                                                                                          # Escape multiline for GITHUB_OUTPUT
                                                                                                                                                                      EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
                                                                                                                                                                                  echo "commit_summary<<$EOF" >> $GITHUB_OUTPUT
                                                                                                                                                                                              echo "$SUMMARY" >> $GITHUB_OUTPUT
                                                                                                                                                                                                          echo "$EOF" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                    fi
                                                                                                                                                                                                                    
                                                                                                                                                                                                                          - name: Report updates
                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                            COUNT="${{ steps.check_commits.outputs.commit_count }}"
                                                                                                                                                                                                                                                      if [ "$COUNT" -gt 0 ]; then
                                                                                                                                                                                                                                                                  echo "========================================="
                                                                                                                                                                                                                                                                              echo " $COUNT new commit(s) this week in"
                                                                                                                                                                                                                                                                                          echo " johnzfitch/claude-cowork-linux"
                                                                                                                                                                                                                                                                                                      echo "========================================="
                                                                                                                                                                                                                                                                                                                  echo ""
                                                                                                                                                                                                                                                                                                                              echo "${{ steps.check_commits.outputs.commit_summary }}"
                                                                                                                                                                                                                                                                                                                                          echo ""
                                                                                                                                                                                                                                                                                                                                                      echo "View full history:"
                                                                                                                                                                                                                                                                                                                                                                  echo "https://github.com/johnzfitch/claude-cowork-linux/commits/master"
                                                                                                                                                                                                                                                                                                                                                                            else
                                                                                                                                                                                                                                                                                                                                                                                        echo "No new commits in the past 7 days for johnzfitch/claude-cowork-linux."
                                                                                                                                                                                                                                                                                                                                                                                                  fi
                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                        - name: Create issue if there are updates
                                                                                                                                                                                                                                                                                                                                                                                                                if: steps.check_commits.outputs.commit_count > 0
                                                                                                                                                                                                                                                                                                                                                                                                                        uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                                                                                                                                                                                                          script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                      const count = '${{ steps.check_commits.outputs.commit_count }}';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const summary = `${{ steps.check_commits.outputs.commit_summary }}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const today = new Date().toISOString().split('T')[0];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          await github.rest.issues.create({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        owner: context.repo.owner,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      repo: context.repo.repo,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    title: `[Weekly Update] claude-cowork-linux: ${count} new commit(s) as of ${today}`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  body: [
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  '## Weekly Repository Update',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  '',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  `**Repo:** [johnzfitch/claude-cowork-linux](https://github.com/johnzfitch/claude-cowork-linux)`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  `**Period:** Last 7 days`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  `**New commits:** ${count}`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  '',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  '### Commits',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  summary,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  '',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  '---',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  '[View full commit history](https://github.com/johnzfitch/claude-cowork-linux/commits/master)',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ].join('\n'),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              labels: ['weekly-update'],
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          });
